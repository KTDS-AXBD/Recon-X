name = "svc-extraction"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8702
inspector_port = 9202

[[d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure"
database_id = "698c88b5-5355-401d-960a-4d8aa74c3b2c"

# Pipeline event bus producer (to emit extraction.completed)
[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

# Service binding to svc-ingestion for fetching parsed chunks
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

# R2 bucket for spec package storage (Phase 2-C)
[[r2_buckets]]
binding = "R2_SPEC_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-extraction"
LLM_ROUTER_URL = "http://localhost:8706"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-extraction", LLM_ROUTER_URL = "https://svc-llm-router-staging.ktds-axbd.workers.dev" }

[[env.staging.d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure-staging"
database_id = "5567133d-b0b5-496d-bf8f-0ef1dea62075"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

[[env.staging.r2_buckets]]
binding = "R2_SPEC_PACKAGES"
bucket_name = "ai-foundry-skill-packages-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-extraction", LLM_ROUTER_URL = "https://svc-llm-router-production.ktds-axbd.workers.dev" }

[[env.production.d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure"
database_id = "698c88b5-5355-401d-960a-4d8aa74c3b2c"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-production"

[[env.production.r2_buckets]]
binding = "R2_SPEC_PACKAGES"
bucket_name = "ai-foundry-skill-packages"
