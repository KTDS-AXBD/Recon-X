name = "svc-ingestion"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8701
inspector_port = 9201

[[d1_databases]]
binding = "DB_INGESTION"
database_name = "db-ingestion"
database_id = "5a17041a-21ee-4aa9-a633-dd2379f8985d"

[[r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "ai-foundry-documents"

[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-ingestion"
MAX_FILE_SIZE_MB = "50"
UNSTRUCTURED_API_URL = "https://api.unstructuredapp.io"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# UNSTRUCTURED_API_KEY

# Queue consumer removed — svc-queue-router is the sole consumer

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-ingestion", MAX_FILE_SIZE_MB = "50", UNSTRUCTURED_API_URL = "https://api.unstructuredapp.io" }

[[env.staging.d1_databases]]
binding = "DB_INGESTION"
database_name = "db-ingestion-staging"
database_id = "27f0a859-c5d1-4f3b-9619-7861a4bf5626"

[[env.staging.r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "ai-foundry-documents-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-ingestion", MAX_FILE_SIZE_MB = "50", UNSTRUCTURED_API_URL = "https://api.unstructuredapp.io" }

[[env.production.d1_databases]]
binding = "DB_INGESTION"
database_name = "db-ingestion"
database_id = "5a17041a-21ee-4aa9-a633-dd2379f8985d"

[[env.production.r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "ai-foundry-documents"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security"
