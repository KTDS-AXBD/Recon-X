name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  migration-drift:
    name: Migration Sequence Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration file sequence integrity
        run: bash scripts/check-migration-drift.sh

  ci:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    needs: [migration-drift]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: cd apps/app-web && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd apps/app-web && pnpm test:e2e
        env:
          CI: true
          VITE_DEMO_MODE: '1'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/app-web/test-results/
          retention-days: 7
