name = "svc-notification"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8709
inspector_port = 9209

[[d1_databases]]
binding = "DB_NOTIFICATION"
database_name = "db-notification"
database_id = "1a6ef6a4-6087-4637-b4d8-4abc7ab2e1bf"

# Queue consumer removed — svc-queue-router is the sole consumer

# Service binding to svc-security for RBAC + audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Queue producer — re-emit or forward events as needed
[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-notification"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# SLACK_WEBHOOK_URL (optional)

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-notification" }

[[env.staging.d1_databases]]
binding = "DB_NOTIFICATION"
database_name = "db-notification-staging"
database_id = "e8a57ad8-3f7d-4ad2-b9ac-dd26aba31db6"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-notification" }

[[env.production.services]]
binding = "SECURITY"
service = "svc-security"

[[env.production.d1_databases]]
binding = "DB_NOTIFICATION"
database_name = "db-notification"
database_id = "1a6ef6a4-6087-4637-b4d8-4abc7ab2e1bf"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"
