name = "svc-queue-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8711
inspector_port = 9211

# NOTE: Default env must NOT have a queue consumer.
# Only staging/production envs consume queues.
# If default env also declares a consumer for the same queue,
# Cloudflare will have a consumer conflict (one queue = one consumer).
# The default env svc-queue-router Worker must be deleted from Cloudflare
# if it exists — see deploy-services.yml which skips default env for this service.

# Service bindings — fan-out targets
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_SKILL"
service = "svc-skill"

[[services]]
binding = "SVC_NOTIFICATION"
service = "svc-notification"

[[services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics"

[[services]]
binding = "SVC_GOVERNANCE"
service = "svc-governance"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-queue-router"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-queue-router" }

[[env.staging.queues.consumers]]
queue = "ai-foundry-pipeline-staging"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 5
dead_letter_queue = "ai-foundry-pipeline-staging-dlq"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

[[env.staging.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-staging"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy-staging"

[[env.staging.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-staging"

[[env.staging.services]]
binding = "SVC_SKILL"
service = "svc-skill-staging"

[[env.staging.services]]
binding = "SVC_NOTIFICATION"
service = "svc-notification-staging"

[[env.staging.services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics-staging"

[[env.staging.services]]
binding = "SVC_GOVERNANCE"
service = "svc-governance-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-queue-router" }

[[env.production.queues.consumers]]
queue = "ai-foundry-pipeline"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 5
dead_letter_queue = "ai-foundry-pipeline-dlq"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-production"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-production"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy-production"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-production"

[[env.production.services]]
binding = "SVC_SKILL"
service = "svc-skill-production"

[[env.production.services]]
binding = "SVC_NOTIFICATION"
service = "svc-notification-production"

[[env.production.services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics-production"

[[env.production.services]]
binding = "SVC_GOVERNANCE"
service = "svc-governance-production"
