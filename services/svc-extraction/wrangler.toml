name = "svc-extraction"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8702
inspector_port = 9202

[[d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure"
database_id = "1f45eb0b-61ad-43b8-b898-0629a7e1a047"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service binding to svc-llm-router for LLM tier routing
[[services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

# Pipeline event bus producer (to emit extraction.completed)
[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

# Service binding to svc-ingestion for fetching parsed chunks
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-extraction"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-extraction" }

[[env.staging.d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure-staging"
database_id = "6b50dfe0-ac8d-401a-8122-c39fde3e19bd"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-extraction" }

[[env.production.d1_databases]]
binding = "DB_EXTRACTION"
database_name = "db-structure"
database_id = "1f45eb0b-61ad-43b8-b898-0629a7e1a047"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security"

[[env.production.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"
