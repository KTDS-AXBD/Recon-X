name = "svc-analytics"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8710
inspector_port = 9210

[[d1_databases]]
binding = "DB_ANALYTICS"
database_name = "db-analytics"
database_id = "a687c3bc-46c0-44a6-ad53-e0c42c3a9142"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service bindings for deliverable export (AIF-REQ-017)
[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-analytics"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-analytics" }

[[env.staging.d1_databases]]
binding = "DB_ANALYTICS"
database_name = "db-analytics-staging"
database_id = "2ba55dc4-91dc-488f-81b7-d35d823ebc31"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[env.staging.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[env.staging.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-analytics" }

[[env.production.d1_databases]]
binding = "DB_ANALYTICS"
database_name = "db-analytics"
database_id = "a687c3bc-46c0-44a6-ad53-e0c42c3a9142"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security-production"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy-production"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-production"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-production"
