name: Deploy app-web (Cloudflare Pages)

on:
  # Production: auto-deploy on push to main
  push:
    branches: [main]
    paths:
      - "apps/app-web/**"
      - "packages/types/**"
      - ".github/workflows/deploy-pages.yml"

  # Manual trigger (production default)
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: production

  release:
    types: [published]

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      pages_branch: ${{ steps.env.outputs.pages_branch }}
    steps:
      - name: Determine environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "environment=${INPUT_ENV}" >> "$GITHUB_OUTPUT"
            if [[ "$INPUT_ENV" == "production" ]]; then
              echo "pages_branch=main" >> "$GITHUB_OUTPUT"
            else
              echo "pages_branch=staging" >> "$GITHUB_OUTPUT"
            fi
          else
            # push to main and release → deploy to production
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "pages_branch=main" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: "Build & Deploy (${{ needs.prepare.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ needs.prepare.outputs.environment }}
    permissions:
      contents: read
      deployments: write
    env:
      DEPLOY_ENV: ${{ needs.prepare.outputs.environment }}
      PAGES_BRANCH: ${{ needs.prepare.outputs.pages_branch }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck app-web
        run: pnpm typecheck --filter=@ai-foundry/app-web

      - name: Build app-web
        run: pnpm build --filter=@ai-foundry/app-web
        working-directory: apps/app-web
        env:
          VITE_ENVIRONMENT: ${{ needs.prepare.outputs.environment }}
          CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}

      - name: Deploy to Cloudflare Workers (preview/staging)
        if: needs.prepare.outputs.environment == 'staging'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: "deploy --env preview"
          workingDirectory: apps/app-web

      - name: Deploy to Cloudflare Workers (production)
        if: needs.prepare.outputs.environment == 'production'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: "deploy --env production"
          workingDirectory: apps/app-web
