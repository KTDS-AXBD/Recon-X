name = "svc-notification"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8709
inspector_port = 9209

[[d1_databases]]
binding = "DB_NOTIFICATION"
database_name = "db-notification"
database_id = "f95b9137-a653-4de6-89d4-1f698d37b3ef"

# Queue consumer removed — svc-queue-router is the sole consumer

# Service binding to svc-security for RBAC + audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Queue producer — re-emit or forward events as needed
[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-notification"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# SLACK_WEBHOOK_URL (optional)

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-notification" }

[[env.staging.d1_databases]]
binding = "DB_NOTIFICATION"
database_name = "db-notification-staging"
database_id = "ee3bd641-9c25-4ad2-9470-44940804cd0c"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-notification" }

[[env.production.services]]
binding = "SECURITY"
service = "svc-security-production"

[[env.production.d1_databases]]
binding = "DB_NOTIFICATION"
database_name = "db-notification"
database_id = "f95b9137-a653-4de6-89d4-1f698d37b3ef"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"
