name = "svc-governance"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8708
inspector_port = 9208

[[d1_databases]]
binding = "DB_GOVERNANCE"
database_name = "db-governance"
database_id = "6b2a5531-e78a-4d6b-9ca5-1ee284e47160"

[[kv_namespaces]]
binding = "KV_PROMPTS"
id = "98ef788593e44f638a94cc7838f9a310"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service binding to svc-llm-router for AI chat
[[services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

# Service bindings for agent tools (6 services)
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_SKILL"
service = "svc-skill"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-governance"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
# GOOGLE_API_KEY

[ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-governance" }

[[env.staging.d1_databases]]
binding = "DB_GOVERNANCE"
database_name = "db-governance-staging"
database_id = "9a593eea-7b4d-4562-9d89-1ef85433a5e5"

[[env.staging.kv_namespaces]]
binding = "KV_PROMPTS"
id = "35b9f45b0fa44bde89b20cc1b9fc9d80"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-staging"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

[[env.staging.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-staging"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy-staging"

[[env.staging.services]]
binding = "SVC_SKILL"
service = "svc-skill-staging"

[[env.staging.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-staging"

[[env.staging.services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics-staging"

[env.staging.ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-governance" }

[[env.production.d1_databases]]
binding = "DB_GOVERNANCE"
database_name = "db-governance"
database_id = "6b2a5531-e78a-4d6b-9ca5-1ee284e47160"

[[env.production.kv_namespaces]]
binding = "KV_PROMPTS"
id = "98ef788593e44f638a94cc7838f9a310"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security"

[[env.production.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[env.production.services]]
binding = "SVC_SKILL"
service = "svc-skill"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[env.production.services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics"

[env.production.ai]
binding = "AI"
