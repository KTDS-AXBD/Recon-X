name: Set Worker Secret

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Target service"
        required: true
        type: choice
        options:
          - svc-ingestion
          - svc-extraction
          - svc-policy
          - svc-ontology
          - svc-skill
          - svc-llm-router
          - svc-security
          - svc-governance
          - svc-notification
          - svc-analytics
          - svc-queue-router
      secret_name:
        description: "Secret name to set"
        required: true
        type: choice
        options:
          - UNSTRUCTURED_API_KEY
          - ANTHROPIC_API_KEY
          - INTERNAL_API_SECRET
          - NEO4J_URI
          - NEO4J_USERNAME
          - NEO4J_PASSWORD
          - NEO4J_DATABASE
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

jobs:
  set-secret:
    name: "Set secret on ${{ inputs.service }} (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Wrangler secret
        working-directory: "services/${{ inputs.service }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_VALUE: ${{ secrets[inputs.secret_name] }}
          TARGET_ENV: ${{ inputs.environment }}
          TARGET_SECRET: ${{ inputs.secret_name }}
        run: printf '%s' "$SECRET_VALUE" | npx wrangler secret put "$TARGET_SECRET" --env "$TARGET_ENV"
