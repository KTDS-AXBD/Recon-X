name = "recon-x-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SERVICE_NAME = "recon-x-api"
ENVIRONMENT = "production"

# 6 service bindings — 5 worker(llm-router/security/governance/notification/analytics)는
# Phase 5 MSA 재조정으로 AI Foundry 포털로 이관됨. svc-queue-router는 내부 전용.
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_SKILL"
service = "svc-skill"

[[services]]
binding = "SVC_MCP_SERVER"
service = "svc-mcp-server"

[env.staging]
name = "recon-x-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.production]
name = "recon-x-api-production"
[env.production.vars]
ENVIRONMENT = "production"
