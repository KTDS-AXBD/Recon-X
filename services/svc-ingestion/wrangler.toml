name = "svc-ingestion"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# CJS alias — avoids ESM import.meta.url crash in CF Workers (web-tree-sitter patch P2)
[alias]
"web-tree-sitter" = "../../packages/utils/node_modules/web-tree-sitter/web-tree-sitter.cjs"

# Pre-compile WASM at build time as WebAssembly.Module (CF Workers: runtime compile disallowed)
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

[dev]
port = 8701
inspector_port = 9201

[[d1_databases]]
binding = "DB_INGESTION"
database_name = "db-ingestion"
database_id = "d0039ffe-48b1-456f-9b6f-0e267c46168a"
migrations_dir = "../../infra/migrations/db-ingestion"

[[r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "ai-foundry-documents"

[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-ingestion"
MAX_FILE_SIZE_MB = "50"
UNSTRUCTURED_API_URL = "https://api.unstructuredapp.io"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# UNSTRUCTURED_API_KEY

# Queue consumer removed — svc-queue-router is the sole consumer

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-ingestion", MAX_FILE_SIZE_MB = "50", UNSTRUCTURED_API_URL = "https://api.unstructuredapp.io" }

[[env.staging.d1_databases]]
binding = "DB_INGESTION"
database_name = "db-ingestion-staging"
database_id = "101ab983-2f40-482e-b658-567695580e3b"
migrations_dir = "../../infra/migrations/db-ingestion"

[[env.staging.r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "ai-foundry-documents-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-ingestion", MAX_FILE_SIZE_MB = "50", UNSTRUCTURED_API_URL = "https://api.unstructuredapp.io" }

[[env.production.d1_databases]]
binding = "DB_INGESTION"
database_name = "db-ingestion"
database_id = "d0039ffe-48b1-456f-9b6f-0e267c46168a"
migrations_dir = "../../infra/migrations/db-ingestion"

[[env.production.r2_buckets]]
binding = "R2_DOCUMENTS"
bucket_name = "ai-foundry-documents"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"
