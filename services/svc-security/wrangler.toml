name = "svc-security"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8707
inspector_port = 9207

[[d1_databases]]
binding = "DB_SECURITY"
database_name = "db-security"
database_id = "2c11d7c8-89f1-472d-aa82-dd181cdf555e"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-security"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# JWT_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-security" }

[[env.staging.d1_databases]]
binding = "DB_SECURITY"
database_name = "db-security-staging"
database_id = "708cca9a-d425-41c2-b4d1-dbc62b356fb0"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-security" }

[[env.production.d1_databases]]
binding = "DB_SECURITY"
database_name = "db-security"
database_id = "2c11d7c8-89f1-472d-aa82-dd181cdf555e"
