name = "app-web"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "development"
DEPLOY_ENV = "staging"

# ---------------------------------------------------------------------------
# Preview environment (wrangler-action deploy --env preview)
# ---------------------------------------------------------------------------
[env.preview]
name = "app-web-preview"
vars = { ENVIRONMENT = "staging", DEPLOY_ENV = "staging" }

[env.preview.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ---------------------------------------------------------------------------
# Production environment (wrangler-action deploy --env production)
# ---------------------------------------------------------------------------
[env.production]
name = "app-web"
vars = { ENVIRONMENT = "production", DEPLOY_ENV = "production" }

[env.production.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
