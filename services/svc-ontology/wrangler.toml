name = "svc-ontology"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8704
inspector_port = 9204

[[d1_databases]]
binding = "DB_ONTOLOGY"
database_name = "db-ontology"
database_id = "f7a72b06-a6d7-43e3-8912-f8a77399cced"

# Service binding to svc-policy for fetching approved policies (queue handler)
[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

# Queue consumer removed — svc-queue-router is the sole consumer

[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-ontology"
LLM_ROUTER_URL = "http://localhost:8706"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# NEO4J_URI        — HTTPS endpoint (e.g. https://xxx.databases.neo4j.io) — NO port!
# NEO4J_USERNAME   — Aura instance username
# NEO4J_PASSWORD   — Aura instance password
# NEO4J_DATABASE   — Aura database name

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-ontology", LLM_ROUTER_URL = "https://svc-llm-router-staging.ktds-axbd.workers.dev" }

[[env.staging.d1_databases]]
binding = "DB_ONTOLOGY"
database_name = "db-ontology-staging"
database_id = "232df4b9-4591-43d6-a3c6-b8185d611aad"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-ontology", LLM_ROUTER_URL = "https://svc-llm-router-production.ktds-axbd.workers.dev" }

[[env.production.d1_databases]]
binding = "DB_ONTOLOGY"
database_name = "db-ontology"
database_id = "f7a72b06-a6d7-43e3-8912-f8a77399cced"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy-production"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"
