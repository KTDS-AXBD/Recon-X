name = "svc-skill"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8705
inspector_port = 9205

[[d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill"
database_id = "96e6ac0c-eefa-45f5-9c07-4fd84a0f1df1"
migrations_dir = "../../infra/migrations/db-skill"

[[r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

[[kv_namespaces]]
binding = "KV_SKILL_CACHE"
id = "bdb5c9697bb546b99f6dadec455fd740"

# Service bindings for cross-service data fetching (queue handler)
[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[[services]]
binding = "SVC_FOUNDRY_X"
service = "foundry-x-api"

# Queue consumer removed — svc-queue-router is the sole consumer

[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

# F356-B: AI-Ready evaluation queue
# NOTE: Default env must NOT have queue consumer — same pattern as svc-queue-router.
# One queue = one consumer in Cloudflare. Consumer is declared only in
# [env.staging.queues.consumers] and [env.production.queues.consumers] blocks below.
# Default env only declares producers (for local dev and type resolution).
[[queues.producers]]
binding = "AI_READY_QUEUE"
queue = "ai-ready-queue"

[[queues.producers]]
binding = "AI_READY_DLQ"
queue = "ai-ready-dlq"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-skill"
FOUNDRY_X_URL = "http://localhost:8710"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET            — inter-service auth (X-Internal-Secret)
# FOUNDRY_X_SECRET
# CLOUDFLARE_AI_GATEWAY_URL      — full OpenRouter URL via CF AI Gateway (TD-44)
# OPENROUTER_API_KEY             — OpenRouter bearer token (TD-44)

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-skill", FOUNDRY_X_URL = "https://foundry-x-api-staging.ktds-axbd.workers.dev" }

[[env.staging.d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill-staging"
database_id = "2ed51d83-f7c1-4835-98e0-65b548d79135"
migrations_dir = "../../infra/migrations/db-skill"

[[env.staging.r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages-staging"

[[env.staging.kv_namespaces]]
binding = "KV_SKILL_CACHE"
id = "100a04bcf8554b6abcc982a3bd7d037f"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy-staging"

[[env.staging.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-staging"

[[env.staging.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-staging"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

[[env.staging.services]]
binding = "SVC_FOUNDRY_X"
service = "foundry-x-api-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

[[env.staging.queues.producers]]
binding = "AI_READY_QUEUE"
queue = "ai-ready-queue-staging"

[[env.staging.queues.consumers]]
queue = "ai-ready-queue-staging"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 3
max_retries = 3
dead_letter_queue = "ai-ready-dlq-staging"

[[env.staging.queues.producers]]
binding = "AI_READY_DLQ"
queue = "ai-ready-dlq-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-skill", FOUNDRY_X_URL = "https://foundry-x-api.ktds-axbd.workers.dev" }

[[env.production.d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill"
database_id = "96e6ac0c-eefa-45f5-9c07-4fd84a0f1df1"
migrations_dir = "../../infra/migrations/db-skill"

[[env.production.r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

[[env.production.kv_namespaces]]
binding = "KV_SKILL_CACHE"
id = "6eaa9c8dba4a452d8997c0d0aac75100"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy-production"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-production"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-production"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-production"

[[env.production.services]]
binding = "SVC_FOUNDRY_X"
service = "foundry-x-api"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[[env.production.queues.producers]]
binding = "AI_READY_QUEUE"
queue = "ai-ready-queue"

[[env.production.queues.consumers]]
queue = "ai-ready-queue"
max_batch_size = 1
max_batch_timeout = 1
max_concurrency = 3
max_retries = 3
dead_letter_queue = "ai-ready-dlq"

[[env.production.queues.producers]]
binding = "AI_READY_DLQ"
queue = "ai-ready-dlq"
