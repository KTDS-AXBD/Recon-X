name = "svc-llm-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[dev]
port = 8706
inspector_port = 9206

# D1 — cost/usage logging
[[d1_databases]]
binding = "DB_LLM"
database_name = "db-llm"
database_id = "dfe48a93-1a32-4ea7-9320-1a809c2ecb83"

# KV — prompt registry cache
[[kv_namespaces]]
binding = "KV_PROMPTS"
id = "00f4b676cf9e47cb8848ba9a3e7bcc3e"

# AI Gateway is accessed via env var (CLOUDFLARE_AI_GATEWAY_URL)
# Anthropic calls route through AI Gateway for logging/caching/rate-limiting

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-llm-router"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET — shared HMAC secret for inter-service auth
# ANTHROPIC_API_KEY — Anthropic API key
# CLOUDFLARE_AI_GATEWAY_URL — AI Gateway base URL
# OPENAI_API_KEY — OpenAI API key (fallback provider)
# GOOGLE_AI_API_KEY — Google AI Studio API key (fallback provider)

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-llm-router" }

[env.staging.ai]
binding = "AI"

[[env.staging.d1_databases]]
binding = "DB_LLM"
database_name = "db-llm-staging"
database_id = "7749061f-c60b-46be-b2f6-ed129428ff08"

[[env.staging.kv_namespaces]]
binding = "KV_PROMPTS"
id = "6816721bb85a4df082f9413bb3311972"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-llm-router" }

[env.production.ai]
binding = "AI"

[[env.production.d1_databases]]
binding = "DB_LLM"
database_name = "db-llm"
database_id = "dfe48a93-1a32-4ea7-9320-1a809c2ecb83"

[[env.production.kv_namespaces]]
binding = "KV_PROMPTS"
id = "00f4b676cf9e47cb8848ba9a3e7bcc3e"
