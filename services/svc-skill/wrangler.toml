name = "svc-skill"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8705
inspector_port = 9205

[[d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill"
database_id = "a3f582ba-21b6-4008-9c41-deed94f9d237"

[[r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

[[kv_namespaces]]
binding = "KV_SKILL_CACHE"
id = "b8ca68ae4a6b4c8b8ddec9e5eed0c09e"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service binding to svc-llm-router for LLM tier routing
[[services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

# Service bindings for cross-service data fetching (queue handler)
[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

# Queue consumer removed — svc-queue-router is the sole consumer

[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-skill"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-skill" }

[[env.staging.d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill-staging"
database_id = "2166b6b5-8f49-4c3d-97b3-02dbd70eaea7"

[[env.staging.r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages-staging"

[[env.staging.kv_namespaces]]
binding = "KV_SKILL_CACHE"
id = "97b63e0e61574cae8de56c54b6e0256b"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-staging"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy-staging"

[[env.staging.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-staging"

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-skill" }

[[env.production.d1_databases]]
binding = "DB_SKILL"
database_name = "db-skill"
database_id = "a3f582ba-21b6-4008-9c41-deed94f9d237"

[[env.production.r2_buckets]]
binding = "R2_SKILL_PACKAGES"
bucket_name = "ai-foundry-skill-packages"

[[env.production.kv_namespaces]]
binding = "KV_SKILL_CACHE"
id = "916333bca3914c959622fc5ff2adbc13"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security"

[[env.production.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"
