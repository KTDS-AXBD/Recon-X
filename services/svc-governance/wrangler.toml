name = "svc-governance"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8708
inspector_port = 9208

[[d1_databases]]
binding = "DB_GOVERNANCE"
database_name = "db-governance"
database_id = "f45c7351-8d4b-458a-80ce-2a33c664e7bd"

[[kv_namespaces]]
binding = "KV_PROMPTS"
id = "00f4b676cf9e47cb8848ba9a3e7bcc3e"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service binding to svc-llm-router for AI chat
[[services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

# Service bindings for agent tools (6 services)
[[services]]
binding = "SVC_INGESTION"
service = "svc-ingestion"

[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

[[services]]
binding = "SVC_POLICY"
service = "svc-policy"

[[services]]
binding = "SVC_SKILL"
service = "svc-skill"

[[services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology"

[[services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-governance"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
# GOOGLE_API_KEY

[ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-governance" }

[[env.staging.d1_databases]]
binding = "DB_GOVERNANCE"
database_name = "db-governance-staging"
database_id = "b889d107-017d-45c1-a1fa-d08a53fecc17"

[[env.staging.kv_namespaces]]
binding = "KV_PROMPTS"
id = "862d4b68a2e24605a8c74d7c0babbf1b"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-staging"

[[env.staging.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-staging"

[[env.staging.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-staging"

[[env.staging.services]]
binding = "SVC_POLICY"
service = "svc-policy-staging"

[[env.staging.services]]
binding = "SVC_SKILL"
service = "svc-skill-staging"

[[env.staging.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-staging"

[[env.staging.services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics-staging"

[env.staging.ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-governance" }

[[env.production.d1_databases]]
binding = "DB_GOVERNANCE"
database_name = "db-governance"
database_id = "f45c7351-8d4b-458a-80ce-2a33c664e7bd"

[[env.production.kv_namespaces]]
binding = "KV_PROMPTS"
id = "00f4b676cf9e47cb8848ba9a3e7bcc3e"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security-production"

[[env.production.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-production"

[[env.production.services]]
binding = "SVC_INGESTION"
service = "svc-ingestion-production"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-production"

[[env.production.services]]
binding = "SVC_POLICY"
service = "svc-policy-production"

[[env.production.services]]
binding = "SVC_SKILL"
service = "svc-skill-production"

[[env.production.services]]
binding = "SVC_ONTOLOGY"
service = "svc-ontology-production"

[[env.production.services]]
binding = "SVC_ANALYTICS"
service = "svc-analytics-production"

[env.production.ai]
binding = "AI"
