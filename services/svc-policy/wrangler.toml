name = "svc-policy"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8703
inspector_port = 9203

[[d1_databases]]
binding = "DB_POLICY"
database_name = "db-policy"
database_id = "48c22ca4-a7f8-4f3d-ae1b-e5dee4e8712a"

# Service binding to svc-security for audit logging
[[services]]
binding = "SECURITY"
service = "svc-security"

# Service binding to svc-llm-router for LLM tier routing (Claude Opus for policy inference)
[[services]]
binding = "LLM_ROUTER"
service = "svc-llm-router"

# Service binding to svc-notification for HITL review alerts
[[services]]
binding = "NOTIFICATION"
service = "svc-notification"

# Service binding to svc-extraction for fetching extraction results (queue handler)
[[services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction"

# Durable Object for HITL session state
[[durable_objects.bindings]]
name = "HITL_SESSION"
class_name = "HitlSession"
script_name = "svc-policy"

[[migrations]]
tag = "v1"
new_classes = ["HitlSession"]

# Queue consumer removed — svc-queue-router is the sole consumer

# Queue producer — emits events after policy inference completes
[[queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "svc-policy"
# Secrets (set via `wrangler secret put`):
# INTERNAL_API_SECRET

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
vars = { ENVIRONMENT = "staging", SERVICE_NAME = "svc-policy" }

[[env.staging.d1_databases]]
binding = "DB_POLICY"
database_name = "db-policy-staging"
database_id = "330cc11b-625b-4c46-915d-078d44828ded"

[[env.staging.services]]
binding = "SECURITY"
service = "svc-security-staging"

[[env.staging.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-staging"

[[env.staging.services]]
binding = "NOTIFICATION"
service = "svc-notification-staging"

[[env.staging.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-staging"

[[env.staging.durable_objects.bindings]]
name = "HITL_SESSION"
class_name = "HitlSession"
script_name = "svc-policy-staging"

[[env.staging.migrations]]
tag = "v1"
new_classes = ["HitlSession"]

[[env.staging.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline-staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
vars = { ENVIRONMENT = "production", SERVICE_NAME = "svc-policy" }

[[env.production.d1_databases]]
binding = "DB_POLICY"
database_name = "db-policy"
database_id = "48c22ca4-a7f8-4f3d-ae1b-e5dee4e8712a"

[[env.production.services]]
binding = "SECURITY"
service = "svc-security-production"

[[env.production.services]]
binding = "LLM_ROUTER"
service = "svc-llm-router-production"

[[env.production.services]]
binding = "NOTIFICATION"
service = "svc-notification-production"

[[env.production.services]]
binding = "SVC_EXTRACTION"
service = "svc-extraction-production"

[[env.production.durable_objects.bindings]]
name = "HITL_SESSION"
class_name = "HitlSession"
script_name = "svc-policy-production"

[[env.production.migrations]]
tag = "v1"
new_classes = ["HitlSession"]

[[env.production.queues.producers]]
binding = "QUEUE_PIPELINE"
queue = "ai-foundry-pipeline"
