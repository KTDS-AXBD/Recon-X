name: Deploy Workers Services

on:
  # Production: auto-deploy on push to main
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - ".github/workflows/deploy-services.yml"

  # Manual trigger (production default)
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: production
      services:
        description: "Services to deploy (comma-separated, or 'all')"
        required: false
        type: string
        default: "all"

  release:
    types: [published]

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-workers
  cancel-in-progress: false

env:
  ALL_SERVICES: "svc-ingestion,svc-extraction,svc-policy,svc-ontology,svc-skill,svc-queue-router,svc-mcp-server"

jobs:
  # -----------------------------------------------------------------------
  # Determine which environment and services to deploy
  # -----------------------------------------------------------------------
  prepare:
    name: Prepare deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      services: ${{ steps.svc.outputs.services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      deploy_gateway: ${{ steps.gw.outputs.deploy_gateway }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Determine environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # INPUT_ENV is constrained by choice type: staging|production
            echo "environment=${INPUT_ENV}" >> "$GITHUB_OUTPUT"
          else
            # push to main and release → deploy to production
            echo "environment=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine services to deploy
        id: svc
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICES: ${{ github.event.inputs.services }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          # For releases, deploy everything
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For manual dispatch with specific services
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]] && [[ "$INPUT_SERVICES" != "all" ]] && [[ -n "$INPUT_SERVICES" ]]; then
            echo "services=${INPUT_SERVICES}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For push events, detect changed services (compare all pushed commits)
          if [[ "$EVENT_NAME" == "push" ]]; then
            # If shared packages changed, deploy all services
            if git diff --name-only "$PUSH_BEFORE" HEAD -- packages/ | grep -q .; then
              echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            CHANGED=$(git diff --name-only "$PUSH_BEFORE" HEAD -- services/ | \
              grep -oP 'services/\K[^/]+' | sort -u | tr '\n' ',' | sed 's/,$//')
            echo "services=${CHANGED}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Default: all services
          echo "services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"

      - name: Build matrix JSON
        id: matrix
        env:
          SERVICES: ${{ steps.svc.outputs.services }}
        run: |
          if [[ -z "$SERVICES" ]]; then
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
          else
            # Convert comma-separated list to JSON array
            JSON=$(echo "$SERVICES" | tr ',' '\n' | jq -R . | jq -sc '.')
            echo "matrix={\"service\":${JSON}}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect gateway changes
        id: gw
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          INPUT_SERVICES: ${{ github.event.inputs.services }}
        run: |
          # Always deploy gateway on release, manual 'all', or workflow file change
          if [[ "$EVENT_NAME" == "release" ]] || [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "deploy_gateway=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On push: deploy if packages/api/ changed
          if [[ "$EVENT_NAME" == "push" ]]; then
            if git diff --name-only "$PUSH_BEFORE" HEAD -- packages/api/ .github/workflows/deploy-services.yml | grep -q .; then
              echo "deploy_gateway=true" >> "$GITHUB_OUTPUT"
            else
              echo "deploy_gateway=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          echo "deploy_gateway=false" >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------------
  # Typecheck (runs once, not per-service)
  # -----------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.services != '' || needs.prepare.outputs.deploy_gateway == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

  # -----------------------------------------------------------------------
  # D1 Migrations — staging auto / production requires manual approval
  # environment protection rules enforce required reviewers for production
  # -----------------------------------------------------------------------
  migrate-d1:
    name: "D1 Migrations (${{ needs.prepare.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [prepare, typecheck]
    environment: ${{ needs.prepare.outputs.environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEPLOY_ENV: ${{ needs.prepare.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Apply D1 migrations — svc-ingestion
        working-directory: services/svc-ingestion
        run: npx wrangler d1 migrations apply DB_INGESTION --env "$DEPLOY_ENV" --remote

      - name: Apply D1 migrations — svc-extraction
        working-directory: services/svc-extraction
        run: npx wrangler d1 migrations apply DB_EXTRACTION --env "$DEPLOY_ENV" --remote

      - name: Apply D1 migrations — svc-policy
        working-directory: services/svc-policy
        run: npx wrangler d1 migrations apply DB_POLICY --env "$DEPLOY_ENV" --remote

      - name: Apply D1 migrations — svc-ontology
        working-directory: services/svc-ontology
        run: npx wrangler d1 migrations apply DB_ONTOLOGY --env "$DEPLOY_ENV" --remote

      - name: Apply D1 migrations — svc-skill
        working-directory: services/svc-skill
        run: npx wrangler d1 migrations apply DB_SKILL --env "$DEPLOY_ENV" --remote

  # -----------------------------------------------------------------------
  # Deploy services (matrix strategy)
  # -----------------------------------------------------------------------
  deploy:
    name: "Deploy ${{ matrix.service }} (${{ needs.prepare.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [prepare, typecheck, migrate-d1]
    if: needs.prepare.outputs.services != ''
    environment: ${{ needs.prepare.outputs.environment }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "services/${{ matrix.service }}"
          command: "deploy --env ${{ needs.prepare.outputs.environment }}"

      # Production service bindings reference default-env Workers (e.g. svc-extraction),
      # not the -production suffixed ones. Deploy to default env as well.
      # Skip svc-queue-router: its queue consumer conflicts with the production env consumer
      # (Cloudflare allows only one consumer per queue). No service binds to queue-router anyway.
      - name: Deploy default env (for service bindings)
        if: needs.prepare.outputs.environment == 'production' && matrix.service != 'svc-queue-router'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "services/${{ matrix.service }}"
          command: "deploy"

  # -----------------------------------------------------------------------
  # Deploy API Gateway (packages/api — separate from services/ matrix)
  # -----------------------------------------------------------------------
  deploy-gateway:
    name: "Deploy recon-x-api (${{ needs.prepare.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [prepare, typecheck]
    if: needs.prepare.outputs.deploy_gateway == 'true'
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Deploy Gateway
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "packages/api"
          command: "deploy"

  # -----------------------------------------------------------------------
  # Summary
  # -----------------------------------------------------------------------
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [prepare, deploy, deploy-gateway]
    if: always()
    env:
      DEPLOY_ENV: ${{ needs.prepare.outputs.environment }}
      DEPLOY_SERVICES: ${{ needs.prepare.outputs.services }}
    steps:
      - name: Print summary
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment**: ${DEPLOY_ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Services**: ${DEPLOY_SERVICES}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger**: ${EVENT_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${COMMIT_SHA}" >> "$GITHUB_STEP_SUMMARY"
