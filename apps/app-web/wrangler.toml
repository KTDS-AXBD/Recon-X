name = "app-web"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
ENVIRONMENT = "development"
DEPLOY_ENV = "staging"

# B-04: Service Binding for /api/auth/me direct routing (Gateway bypass).
# Gateway routing table에 /auth/me 매핑 부재로 404 발생 → worker.ts에서
# /api/auth/me만 svc-skill로 직접 invocation.
[[services]]
binding = "SVC_SKILL"
service = "svc-skill"

# ---------------------------------------------------------------------------
# Preview environment (wrangler-action deploy --env preview)
# ---------------------------------------------------------------------------
[env.preview]
name = "app-web-preview"
vars = { ENVIRONMENT = "staging", DEPLOY_ENV = "staging" }

[env.preview.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[env.preview.services]]
binding = "SVC_SKILL"
service = "svc-skill-staging"

# ---------------------------------------------------------------------------
# Production environment (wrangler-action deploy --env production)
# ---------------------------------------------------------------------------
[env.production]
name = "app-web"
vars = { ENVIRONMENT = "production", DEPLOY_ENV = "production" }

[env.production.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[env.production.services]]
binding = "SVC_SKILL"
service = "svc-skill-production"
