---
emptySlotId: ES-GIFT-003
title: 선물 잔액 이전 원자성 — 테스트 계약
sprint: 214c
taxonomy: E3
sourceMarker: SOURCE_MISSING
---

scenarios:
  - id: TC-GATOM-001
    name: 선물 수락 시 원자적 잔액 이전 성공
    given:
      giftId: "gift-atom-001"
      status: "pending"
      amount: 20000
      senderBalance: 80000
      receiverBalance: 10000
    when: receiver_accepts_gift
    then:
      - giftStatus: "accepted"
      - senderBalance: 80000   # 이미 차감됨 (발송 시)
      - receiverBalance: 30000  # 20000 증가
      - ledgerEntries: 2        # debit_sender + credit_receiver
      - eventEmitted: "GiftAccepted"
      - responseStatus: 200

  - id: TC-GATOM-002
    name: 수신자 잔액 증가 실패 시 전체 롤백
    given:
      giftId: "gift-atom-002"
      status: "pending"
      amount: 20000
      receiverUpdateFails: true  # 시뮬레이션: DB 오류
    when: receiver_accepts_gift
    then:
      - giftStatus: "pending"   # 롤백 — 상태 복원
      - ledgerEntriesCreated: 0  # 롤백으로 제거
      - eventEmitted: "GiftTransferFailed"
      - responseStatus: 500

  - id: TC-GATOM-003
    name: 재시도 시 중복 삽입 방지 (멱등성)
    given:
      giftId: "gift-atom-003"
      status: "accepted"   # 이미 수락됨
      ledgerEntriesExist: true
    when: receiver_accepts_gift_retry
    then:
      - giftStatus: "accepted"  # 변경 없음
      - ledgerEntriesCreated: 0  # 중복 삽입 없음 (UNIQUE 인덱스)
      - responseStatus: 422
      - errorCode: "GIFT_ALREADY_ACCEPTED"

  - id: TC-GATOM-004
    name: 트랜잭션 격리 검증 (동시 수락 방지)
    given:
      giftId: "gift-atom-004"
      status: "pending"
      concurrentAcceptRequests: 2
    when: two_receivers_accept_simultaneously
    then:
      - exactlyOneAccepted: true
      - ledgerEntriesCreated: 2    # 오직 1번의 수락만 2행 생성
      - finalStatus: "accepted"
